name: Github Actions Demo

on: [ push ]

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Info
        run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

      - name: Install and Test
        run: |
          npm install
          npm test